<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 220" width="100%" height="auto">
  <defs>
    <!-- Volt Green Glow Filter -->
    <filter id="voltGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="0.8"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0D1117" rx="6" />

  <!-- Outer Double Border -->
  <rect x="6" y="6" width="448" height="208" fill="none" stroke="#CCFF00" stroke-width="1.5" rx="4" opacity="0.4" filter="url(#voltGlow)" />
  <rect x="10" y="10" width="440" height="200" fill="none" stroke="#CCFF00" stroke-width="0.75" rx="3" opacity="0.2" filter="url(#voltGlow)" />

  <!-- Pixel Characters Group with Glow -->
  <g filter="url(#voltGlow)">
    <!-- ================= CHAR: A ================= -->
    <g transform="translate(50, 20)">
      <!-- Segments -->
      <rect x="0" y="15" width="15" height="65" rx="2" fill="#CCFF00" />
      <rect x="45" y="15" width="15" height="65" rx="2" fill="#CCFF00" />
      <rect x="0" y="0" width="60" height="15" rx="2" fill="#CCFF00" />
      <rect x="15" y="35" width="30" height="12" rx="2" fill="#CCFF00" />
      <!-- Wiring Tracks -->
      <path d="M -4,11 L -4,84 L 19,84 L 19,51 L 41,51 L 41,84 L 64,84 L 64,11 L 49,-4 L 11,-4 Z" fill="none" stroke="#CCFF00" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.65" />
      <path d="M 19,19 L 41,19 L 41,31 L 19,31 Z" fill="none" stroke="#CCFF00" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.65" />
    </g>
    <!-- ================= CHAR: H ================= -->
    <g transform="translate(125, 20)">
      <!-- Segments -->
      <rect x="0" y="0" width="15" height="80" rx="2" fill="#CCFF00" />
      <rect x="45" y="0" width="15" height="80" rx="2" fill="#CCFF00" />
      <rect x="15" y="32.5" width="30" height="15" rx="2" fill="#CCFF00" />
      <!-- Wiring Tracks -->
      <path d="M -4,-4 L 19,-4 L 19,28.5 L 41,28.5 L 41,-4 L 64,-4 L 64,84 L 41,84 L 41,51.5 L 19,51.5 L 19,84 L -4,84 Z" fill="none" stroke="#CCFF00" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.65" />
    </g>
    <!-- ================= CHAR: M ================= -->
    <g transform="translate(200, 20)">
