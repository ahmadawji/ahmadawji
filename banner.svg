      <path d="M 1,-4 L 59,-4 L 59,19 L 41,19 L 41,61 L 59,61 L 59,84 L 1,84 L 1,61 L 19,61 L 19,19 L 1,19 Z" fill="none" stroke="#CCFF00" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.65" />
